<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NovuTalks animated logo">
  <defs>
    <linearGradient id="bg" x1="88" y1="64" x2="424" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="0.55" stop-color="#0f766e" />
      <stop offset="1" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="bubble" x1="160" y1="144" x2="360" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#d1fae5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.06  0 0 0 0 0.67  0 0 0 0 0.50  0 0 0 0.45 0" />
    </filter>
  </defs>

  <style>
    .float {
      animation: float 3.6s ease-in-out infinite;
      transform-origin: 256px 256px;
    }
    .eye {
      transform-origin: center;
    }
    .blink {
      animation: blink 4.8s infinite;
      transform-origin: center;
    }
    .blink.delayed {
      animation-delay: 0.18s;
    }
    .smile {
      animation: smile 3.6s ease-in-out infinite;
      transform-origin: center;
    }
    .shine {
      animation: shine 2.8s ease-in-out infinite;
    }
    .orbit {
      animation: orbit 6s linear infinite;
      transform-origin: 256px 256px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-8px) scale(1.01); }
    }
    @keyframes blink {
      0%, 4%, 8%, 100% { transform: scaleY(1); }
      5.5% { transform: scaleY(0.12); }
      6.5% { transform: scaleY(1); }
    }
    @keyframes smile {
      0%, 100% { transform: translateY(0px) scaleX(1); }
      50% { transform: translateY(1px) scaleX(1.03); }
    }
    @keyframes shine {
      0%, 100% { opacity: 0.65; transform: translateY(0px); }
      50% { opacity: 1; transform: translateY(-6px); }
    }
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <rect width="512" height="512" rx="124" fill="url(#bg)" />

  <g filter="url(#glow)" opacity="0.8" class="shine">
    <circle cx="150" cy="130" r="22" fill="#86efac" />
    <circle cx="378" cy="160" r="14" fill="#67e8f9" />
  </g>

  <g class="float">
    <path d="M148 144h216c35.3 0 64 28.7 64 64v84c0 35.3-28.7 64-64 64H278l-74 60c-7.3 5.9-18.1 0.7-18.1-8.6V356h-38.9c-35.3 0-64-28.7-64-64v-84c0-35.3 28.7-64 64-64Z" fill="url(#bubble)"/>
    <path d="M166 166h180c31.5 0 57 25.5 57 57v69c0 31.5-25.5 57-57 57H264l-56 45v-45h-42c-31.5 0-57-25.5-57-57v-69c0-31.5 25.5-57 57-57Z" fill="#f8fffb" opacity="0.55"/>

    <circle cx="210" cy="252" r="17" fill="#0f172a" class="eye blink">
      <animate attributeName="r" values="17;17.8;17" dur="3.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="302" cy="252" r="17" fill="#0f172a" class="eye blink delayed" style="animation-direction: reverse;">
      <animate attributeName="r" values="17;17.8;17" dur="3.4s" repeatCount="indefinite" />
    </circle>

    <ellipse cx="210" cy="245" rx="15" ry="14" fill="#ffffff" opacity="0.22" class="blink" />
    <ellipse cx="302" cy="245" rx="15" ry="14" fill="#ffffff" opacity="0.22" class="blink delayed" />

    <path d="M214 294c10 14 30 22 42 8" fill="none" stroke="#0f766e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" class="smile" />
    <path d="M211 298c14 10 33 10 45 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85" class="smile" />
    <path d="M207 301c10 18 47 22 59 5" fill="none" stroke="#14b8a6" stroke-width="8" stroke-linecap="round" opacity="0.34" class="smile" />

    <circle cx="177" cy="290" r="8" fill="#fda4af" opacity="0.75" />
    <circle cx="335" cy="290" r="8" fill="#fda4af" opacity="0.75" />

    <path d="M196 225c8-11 20-17 34-17" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.55" />
    <path d="M284 225c8-11 20-17 34-17" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.55" />
  </g>
</svg>
